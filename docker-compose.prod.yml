# HaVeWa — Produktion (VPS). Start: docker compose -f docker-compose.prod.yml up -d --build
# Erwartet eine .env-Datei daneben (siehe .env.prod.example).
services:
  app:
    build: .
    container_name: havewa-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://havewa:${DB_PASSWORD}@db:5432/havewa?schema=public"
      AUTH_SECRET: "${AUTH_SECRET}"
      AUTH_TRUST_HOST: "true"
    expose:
      - "3000"
    volumes:
      - havewa-storage:/app/storage

  caddy:
    image: caddy:2-alpine
    container_name: havewa-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  db:
    image: postgres:16-alpine
    container_name: havewa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: havewa
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: havewa
    volumes:
      - havewa-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U havewa"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  havewa-db:
  havewa-storage:
  caddy-data:
  caddy-config:
